name: Generate LOFI video test

on:
  workflow_dispatch:
    inputs:
      video_number:
        description: "Driveの video_XXX 番号"
        required: true
        default: "001"
      output_file:
        description: "完成MP4ファイル名"
        required: true
        default: "Tokyo_Memory_Archive_001_test.mp4"
      enable_logo:
        description: "ロゴ表示を有効化する場合は1"
        required: true
        default: "1"
      enable_film_grain:
        description: "フィルムグレインを有効化する場合は1"
        required: true
        default: "0"
      enable_film_dust:
        description: "フィルムダストを有効化する場合は1"
        required: true
        default: "0"
      fail_on_optional_visual_fallback:
        description: "任意ビジュアルのフォールバックを失敗扱いにする場合は1"
        required: true
        default: "0"

jobs:
  generate-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Download assets from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          rm -rf video_assets dist
          python scripts/download_drive_video_assets.py \
            --video-number "${{ inputs.video_number }}" \
            --output-dir video_assets

      - name: Generate test MP4
        env:
          ASSET_DIR: video_assets
          OUTPUT_DIR: dist
          OUTPUT_FILE: ${{ inputs.output_file }}
          ENABLE_LOGO: ${{ inputs.enable_logo }}
          ENABLE_RAIN_OVERLAY: "0"
          ENABLE_FILM_GRAIN: ${{ inputs.enable_film_grain }}
          ENABLE_FILM_DUST: ${{ inputs.enable_film_dust }}
          FAIL_ON_OPTIONAL_VISUAL_FALLBACK: ${{ inputs.fail_on_optional_visual_fallback }}
        run: |
          scripts/generate_lofi_video.sh

      - name: Upload test MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_file }}
          path: dist/${{ inputs.output_file }}
          if-no-files-found: error