name: Generate LOFI video

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      DRIVE_FOLDER_ID:
        description: "デバッグ用: 指定したDriveフォルダIDを直接処理（通常は空）"
        required: false
        default: ""
      video_number:
        description: "デバッグ用: Driveの video_XXX 番号（DRIVE_FOLDER_IDもincomingも未使用時のみ）"
        required: false
        default: ""
      output_file:
        description: "デバッグ用: 完成MP4ファイル名（通常はincomingフォルダ名から自動設定）"
        required: false
        default: ""
      youtube_title:
        description: "デバッグ用: YouTube動画タイトル（通常はincomingフォルダ名から自動設定）"
        required: false
        default: ""
      youtube_description:
        description: "YouTube動画説明文"
        required: false
        default: "Tokyo ChillMatic FM - rainy lofi archive."
      youtube_tags:
        description: "YouTubeタグ（カンマ区切り）"
        required: false
        default: "lofi, chill, tokyo, rain, study music"
      upload_to_drive:
        description: "生成したMP4をGoogle Driveへアップロードする"
        required: false
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Process all incoming work folders
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.DRIVE_FOLDER_ID == '' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOKYO_CHILLMATIC_DRIVE_FOLDER_ID: ${{ secrets.TOKYO_CHILLMATIC_DRIVE_FOLDER_ID }}
          BGM_VOLUME: "1.0"
          BACKGROUND_AUDIO_VOLUME: "1.0"
          AUDIO_LIMIT: "0.98"
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_DESCRIPTION: ${{ inputs.youtube_description || 'Tokyo ChillMatic FM - rainy lofi archive.' }}
          YOUTUBE_TAGS: ${{ inputs.youtube_tags || 'lofi, chill, tokyo, rain, study music' }}
          # Temporarily disable only the YouTube upload while authentication is completed.
          # Set to "true" to restore the existing upload behavior.
          ENABLE_YOUTUBE_UPLOAD: "false"
        run: |
          processed_count=0
          failed_count=0
          while true; do
            incoming_output="$(mktemp)"
            GITHUB_OUTPUT="${incoming_output}" python scripts/drive_incoming_queue.py detect
            found="false"
            work_folder_id=""
            work_folder_name=""
            track_count=""
            output_file=""
            youtube_title=""
            while IFS='=' read -r key value; do
              case "${key}" in
                found) found="${value}" ;;
                work_folder_id) work_folder_id="${value}" ;;
                work_folder_name) work_folder_name="${value}" ;;
                track_count) track_count="${value}" ;;
                output_file) output_file="${value}" ;;
                youtube_title) youtube_title="${value}" ;;
              esac
            done < "${incoming_output}"
            rm -f "${incoming_output}"

            if [[ "${found:-false}" != "true" ]]; then
              echo "No valid incoming work folder found. Exiting without generation."
              break
            fi

            echo "incoming selected work_folder_id=${work_folder_id}"
            echo "incoming selected work_folder_name=${work_folder_name}"
            echo "asset acquisition method=incoming-queue"

            rm -rf video_assets dist
            mkdir -p dist_all
            set +e
            (
              set -euo pipefail
              python scripts/download_drive_video_assets.py \
                --drive-folder-id "${work_folder_id}" \
                --output-dir video_assets
              export ASSET_DIR=video_assets
              export OUTPUT_DIR=dist
              export OUTPUT_FILE="${output_file}"
              echo "Output file: dist/${OUTPUT_FILE}"
              echo "Using minimal CapCut background_loop.mp4 generation matched to concatenated Suno track duration."
              echo "No waveform, rain overlay, film grain, film dust, color correction, logo, or video filters are applied."
              scripts/generate_lofi_video.sh
              if [[ "${ENABLE_YOUTUBE_UPLOAD}" == "true" ]]; then
                echo "YouTube upload starting: dist/${OUTPUT_FILE}"
                python scripts/upload_youtube_video.py \
                  --file "dist/${OUTPUT_FILE}" \
                  --title "${youtube_title}" \
                  --description "${YOUTUBE_DESCRIPTION}" \
                  --tags "${YOUTUBE_TAGS}"
              else
                echo "YouTube upload temporarily disabled; skipping upload for dist/${OUTPUT_FILE}"
              fi
              cp "dist/${OUTPUT_FILE}" "dist_all/${OUTPUT_FILE}"
            )
            status=$?
            set -e

            if [[ ${status} -eq 0 ]]; then
              python scripts/drive_incoming_queue.py move \
                --folder-id "${work_folder_id}" \
                --destination completed
              processed_count=$((processed_count + 1))
            else
              python scripts/drive_incoming_queue.py move \
                --folder-id "${work_folder_id}" \
                --destination failed
              failed_count=$((failed_count + 1))
            fi

            unset found work_folder_id work_folder_name track_count output_file youtube_title
          done

          echo "incoming processing summary: completed=${processed_count} failed=${failed_count}"
          if (( failed_count > 0 )); then
            exit 1
          fi

      - name: Upload incoming MP4 artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.DRIVE_FOLDER_ID == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: incoming-generated-mp4
          path: dist_all/*.mp4
          if-no-files-found: ignore

      - name: Download assets from Google Drive
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DRIVE_FOLDER_ID != '' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOKYO_CHILLMATIC_DRIVE_FOLDER_ID: ${{ secrets.TOKYO_CHILLMATIC_DRIVE_FOLDER_ID }}
          WORKFLOW_DISPATCH_DRIVE_FOLDER_ID: ${{ inputs.DRIVE_FOLDER_ID || '' }}
          WORKFLOW_DISPATCH_VIDEO_NUMBER: ${{ inputs.video_number || '' }}
          RESOLVED_DRIVE_FOLDER_ID: ${{ inputs.DRIVE_FOLDER_ID || '' }}
          VIDEO_NUMBER: ${{ inputs.video_number || '001' }}
        run: |
          rm -rf video_assets dist
          echo "workflow_dispatch DRIVE_FOLDER_ID=${WORKFLOW_DISPATCH_DRIVE_FOLDER_ID}"
          echo "resolved DRIVE_FOLDER_ID=${RESOLVED_DRIVE_FOLDER_ID}"
          echo "workflow_dispatch debug inputs: video_number=${WORKFLOW_DISPATCH_VIDEO_NUMBER}"
          echo "VIDEO_NUMBER=${VIDEO_NUMBER}"
          if [[ -n "${RESOLVED_DRIVE_FOLDER_ID}" ]]; then
            echo "asset acquisition method=drive-folder-id"
            python scripts/download_drive_video_assets.py \
              --drive-folder-id "${RESOLVED_DRIVE_FOLDER_ID}" \
              --output-dir video_assets
          else
            echo "No debug DRIVE_FOLDER_ID was provided." >&2
            exit 1
          fi

      - name: Generate MP4
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DRIVE_FOLDER_ID != '' }}
        env:
          ASSET_DIR: video_assets
          OUTPUT_DIR: dist
          OUTPUT_FILE: ${{ inputs.output_file }}
          BGM_VOLUME: "1.0"
          BACKGROUND_AUDIO_VOLUME: "1.0"
          AUDIO_LIMIT: "0.98"
        run: |
          echo "Output file: dist/${OUTPUT_FILE}"
          echo "Using minimal CapCut background_loop.mp4 generation matched to concatenated Suno track duration."
          echo "No waveform, rain overlay, film grain, film dust, color correction, logo, or video filters are applied."
          scripts/generate_lofi_video.sh

      - name: Upload MP4 artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DRIVE_FOLDER_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_file }}
          path: dist/${{ inputs.output_file }}
          if-no-files-found: error

      - name: Upload MP4 to Google Drive
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_drive }}
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOKYO_CHILLMATIC_DRIVE_FOLDER_ID: ${{ secrets.TOKYO_CHILLMATIC_DRIVE_FOLDER_ID }}
        run: |
          python scripts/upload_drive_output.py \
            --file "dist/${{ inputs.output_file }}" \
            --output-name "${{ inputs.output_file }}"

      - name: Upload private video to YouTube
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DRIVE_FOLDER_ID != '' }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OUTPUT_FILE: ${{ inputs.output_file }}
          YOUTUBE_TITLE: ${{ inputs.youtube_title }}
          YOUTUBE_DESCRIPTION: ${{ inputs.youtube_description || 'Tokyo ChillMatic FM - rainy lofi archive.' }}
          YOUTUBE_TAGS: ${{ inputs.youtube_tags || 'lofi, chill, tokyo, rain, study music' }}
          # Temporarily disable only the YouTube upload while authentication is completed.
          # Set to "true" to restore the existing upload behavior.
          ENABLE_YOUTUBE_UPLOAD: "false"
        run: |
          if [[ "${ENABLE_YOUTUBE_UPLOAD}" == "true" ]]; then
            echo "YouTube upload starting: dist/${OUTPUT_FILE}"
            python scripts/upload_youtube_video.py \
              --file "dist/${OUTPUT_FILE}" \
              --title "${YOUTUBE_TITLE}" \
              --description "${YOUTUBE_DESCRIPTION}" \
              --tags "${YOUTUBE_TAGS}"
          else
            echo "YouTube upload temporarily disabled; skipping upload for dist/${OUTPUT_FILE}"
          fi
