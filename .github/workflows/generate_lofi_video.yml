name: Generate LOFI video

on:
  workflow_dispatch:
    inputs:
      video_number:
        description: "Driveの video_XXX 番号"
        required: true
        default: "001"
      output_file:
        description: "完成MP4ファイル名"
        required: true
        default: "Tokyo_Memory_Archive_001.mp4"
      youtube_title:
        description: "YouTube動画タイトル"
        required: true
        default: "Tokyo Memory Archive 001 - Tokyo ChillMatic FM"
      youtube_description:
        description: "YouTube動画説明文"
        required: false
        default: "Tokyo ChillMatic FM - rainy lofi archive."
      youtube_tags:
        description: "YouTubeタグ（カンマ区切り）"
        required: false
        default: "lofi, chill, tokyo, rain, study music"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Download assets from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/download_drive_video_assets.py \
            --video-number "${{ inputs.video_number }}" \
            --output-dir video_assets

      - name: Generate 60 minute MP4
        env:
          ASSET_DIR: video_assets
          OUTPUT_DIR: dist
          OUTPUT_FILE: ${{ inputs.output_file }}
          TARGET_SECONDS: "3600"
        run: scripts/generate_lofi_video.sh

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_file }}
          path: dist/${{ inputs.output_file }}
          if-no-files-found: error

      - name: Upload MP4 to Google Drive
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/upload_drive_output.py \
            --file "dist/${{ inputs.output_file }}" \
            --output-name "${{ inputs.output_file }}"

      - name: Upload private video to YouTube
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OUTPUT_FILE: ${{ inputs.output_file }}
          YOUTUBE_TITLE: ${{ inputs.youtube_title }}
          YOUTUBE_DESCRIPTION: ${{ inputs.youtube_description }}
          YOUTUBE_TAGS: ${{ inputs.youtube_tags }}
        run: |
          python scripts/upload_youtube_video.py \
            --file "dist/${OUTPUT_FILE}" \
            --title "${YOUTUBE_TITLE}" \
            --description "${YOUTUBE_DESCRIPTION}" \
            --tags "${YOUTUBE_TAGS}"
