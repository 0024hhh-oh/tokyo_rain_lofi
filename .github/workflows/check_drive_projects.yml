name: Check Google Drive Projects

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:

concurrency:
  group: drive-projects-ready
  cancel-in-progress: false

jobs:
  check-projects:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Projects direct-folder mode notice
        run: |
          echo "Projects folders are now processed directly by generate_lofi_video.yml."
          echo "No Drive copy/create/upload or pre-move staging is performed in this workflow."
