name: Extract rain audio from Drive

on:
  workflow_dispatch:

concurrency:
  group: extract-rain-audio
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Extract rain audio and upload it to Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOKYO_CHILLMATIC_DRIVE_FOLDER_ID: ${{ secrets.TOKYO_CHILLMATIC_DRIVE_FOLDER_ID }}
        run: python scripts/extract_drive_rain_audio.py

      - name: Preserve extracted audio as an artifact
        if: ${{ always() && hashFiles('dist/rain.m4a') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rain-audio-m4a
          path: dist/rain.m4a
          retention-days: 7
          compression-level: 0
