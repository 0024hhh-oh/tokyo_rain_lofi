name: Extract rain audio from Drive

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/extract_rain_audio.yml"
      - "scripts/extract_drive_rain_audio.py"
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: extract-rain-audio
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Extract rain audio and upload it to Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOKYO_CHILLMATIC_DRIVE_FOLDER_ID: ${{ secrets.TOKYO_CHILLMATIC_DRIVE_FOLDER_ID }}
        run: python scripts/extract_drive_rain_audio.py
